# 各チャネルの規約・トンマナ
# audience: internal | external
# variants: 1事業から複数の投稿セットを生成する場合のシリーズ定義

channels:
  line:
    label: LINE（会員グループ）
    audience: internal
    char_target: "500〜900字"
    tone: 親しみやすく丁寧。敬体厳守。絵文字は使わない。
    must_include:
      - 冒頭の「公益社団法人　いわき青年会議所／会員各位」
      - 担当委員会・役職・氏名（議案書になければ委員会名のみ）
      - 事業名・開催日時・場所のリード一文
      - 事業の目的・背景の説明
      - 事業内容（【第一部】【第二部】 もしくは 地の文）
      - ●開催日時（受付開始時刻も併記）
      - ●開催場所
      - ●服装
      - 締めの呼びかけ + 署名
    style_notes:
      - 冒頭は「公益社団法人　いわき青年会議所　/ 会員各位」（全角スペース）。
      - 箇条書きの記号は ● を使う（- や ・ ではない）。
      - 【第一部】【第二部】等のセクションタイトルは事業内容に応じて使う。プログラムが分かれていない事業では地の文で書く。
      - JC内部用語（例会、設営、卒業、現役、懇親会 等）はOK。
    closing: internal

  x:
    label: X（旧Twitter）
    audience: external
    char_target: "本文140字以内（URL・ハッシュタグ別枠が望ましい）"
    tone: 短く・テンポよく・興味喚起。語尾の固さを抑える。
    must_include:
      - 事業名（短縮可）
      - 日時 or 申込締切
      - URL or 詳細はプロフリンクへ等の導線
      - ハッシュタグ2〜4個
    style_notes:
      - 投稿1本ずつが独立して読めるようにする。
      - 改行と空白を活用する。
      - 絵文字は1〜2個までを目安とする。
    variants:
      - id: announce
        label: 告知（最初の投稿）
        focus: 事業の意義 + 開催情報 + 申込URL
      - id: one_week
        label: 1週間前
        focus: 申込締切間近 + 当日の見どころ
      - id: day_before
        label: 前日
        focus: 明日開催の最終リマインド + 持ち物・天候等の補足
      - id: day_of
        label: 当日
        focus: 「これから始まります」感 + 会場周辺写真の想定
      - id: after
        label: 事後報告
        focus: 開催のお礼 + 印象的なシーン + 次回・関連事業への接続
    closing: casual

  facebook:
    label: Facebook
    audience: external
    char_target: "600〜900字 + ハッシュタグ5〜8個"
    tone: 熱量高め、エピソード調。事業写真を前提とした語り口。
    must_include:
      - 事業名と開催日時・場所
      - 事業の社会的意義
      - 参加者・観覧者へのメリット
      - 申込URL or 問い合わせ先
      - ハッシュタグ
    style_notes:
      - 1段落2〜4文程度で改行を入れ、読みやすくする。
      - 「私たちいわき青年会議所は…」のように主体を明示してよい。
      - 写真前提なので「写真は○○の様子」のような注釈は不要。
    closing: formal

  instagram:
    label: Instagram（キャプション）
    audience: external
    char_target: "400〜700字 + ハッシュタグ10〜15個"
    tone: やわらかく、改行多めで視認性重視。絵文字は適度に使ってよい。
    must_include:
      - 事業名と開催日時・場所
      - 簡潔な事業説明
      - 参加・観覧導線
      - ハッシュタグ（多めにして発見性を上げる）
    style_notes:
      - 画像とセットで読まれる前提なので、最初の2〜3行で要点を掴ませる。
      - 改行を多めに入れてスマホで読みやすくする。
      - 「プロフィールのリンクから」など Instagram 特有の導線を意識する。
    closing: casual

  website:
    label: HP掲載文
    audience: external
    char_target: "1200〜1800字、見出し付き"
    tone: 正式・丁寧、敬体厳守。事業の社会的意義を厚く語る。
    must_include:
      - 事業名と開催日時・場所
      - 事業の背景・目的（社会的意義）
      - 事業内容の詳細
      - 対象・参加方法・参加費
      - 主催・共催・後援
      - 問い合わせ先
    style_notes:
      - 見出しを「## 事業概要」「## 開催の背景」「## プログラム」「## 参加のご案内」のように構造化する。
      - 公式名称（公益社団法人いわき青年会議所）を最低1回は記載する。
      - SEOを意識し、地名・事業テーマ・対象層をタイトル/見出しに含める。
    closing: formal
