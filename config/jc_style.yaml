# 青年会議所(JC)広報文の汎用スタイルガイド
# 個別の他LOM投稿は転用せず、JC広報の一般的なトンマナをここに整理する。

mission_keywords:
  - 明るい豊かな社会の実現
  - JC運動
  - 友情・修練・奉仕
  - 青年の英知と勇気と情熱
  - 地域の未来
  - まちづくり / ひとづくり

tone_principles:
  - 市民・参加者への敬意を最優先する。上から目線・行政文・内輪ネタを避ける。
  - 事業の「社会的意義」と「参加者の体験価値」を両輪で語る。
  - 数字や固有名詞（日時・場所・対象・定員）は必ず明示する。
  - 強い断定や煽り表現（絶対・必ず参加すべき・人生が変わる等）は避け、誠実で前向きな表現にする。
  - 過度な絵文字・顔文字は避ける（チャネル別ルールに従う）。

structure_template:
  - 1. リード(なぜ今この事業をやるのか／市民への問いかけ)
  - 2. 事業の概要(日時・場所・テーマ・対象)
  - 3. 参加することで得られる価値・体験
  - 4. 主催者(LOM)からの想い
  - 5. 申込・問い合わせ導線

avoid_phrases:
  - 必ず参加してください
  - 人生が変わります
  - 損はさせません
  - すごい / やばい / マジで（公式広報として砕けすぎ）
  - 〜のみなさんへ朗報です（販促色が強い）

# 内向け事業(対内)と外向け事業(対外)の区別
audience_modes:
  internal:
    name: 対内（JC会員向け）
    description: |
      会員グループLINE等で配信する、メンバー向けの参加呼びかけ。
      JC内用語OK、要点重視、実務情報（日時・集合場所・服装・出欠締切・担当委員会）を必ず網羅する。
    must_include:
      - 事業名と開催日時
      - 集合場所・終了予定時刻
      - 服装（スーツ／JCポロ／私服等）
      - 出欠の回答方法と締切
      - 担当委員会・問い合わせ先
  external:
    name: 対外（市民・一般向け）
    description: |
      市民・一般の方に「JCはこんな活動をしています」と興味を持っていただくための発信。
      JC内用語は避けるか初出で説明する（例：「LOM」→「いわきJC」）。
      参加者・観覧者・支援者になっていただくための、わかりやすく前向きな文章。
    must_include:
      - 事業名と開催日時・場所
      - 誰に向けた事業か（対象）
      - 参加・観覧の方法（無料/有料、申込URL等）
